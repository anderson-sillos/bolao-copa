version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      eslint-ecosystem:
        patterns:
          - eslint
          - eslint-*
          - '@typescript-eslint/*'
      npm-minor-patch:
        exclude-patterns:
          - eslint
          - eslint-*
          - '@typescript-eslint/*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - '*'
